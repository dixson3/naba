name: ci

# The shipped `naba` is a single Rust binary. (The legacy Go source and its parity-baseline
# job were retired once Rust parity was trusted.) The parity job runs the suite against the
# Rust binary. The whole suite is fully mocked — NO secrets / live API keys are required.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- Rust: the shipped product. build + fmt + clippy + unit tests. ------------------
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --release

      - name: Unit tests
        run: cargo test

  # --- Parity: run tests/parity against the Rust binary + the SPEC<->test traceability. -
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v5

      - name: Build Rust binary (shipped)
        run: cargo build --release

      - name: SPEC <-> test traceability check
        run: uv run tests/parity/check_traceability.py

      - name: Parity suite — Rust
        run: NABA_BIN="$PWD/target/release/naba" uv run --project tests/parity pytest tests/parity
