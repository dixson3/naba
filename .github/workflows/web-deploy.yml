# Web deploy for naba.ysapp.net (Pelican -> S3 -> CloudFront).
#
# Two triggers:
#   - workflow_dispatch — the manual "Run workflow" button (shape #2).
#   - workflow_run after "Release" succeeds — auto-on-release (#3), so a new release
#     (binaries + tag) also republishes the site and re-mirrors install.sh from the
#     freshly-published release. `release.yml` is cargo-dist-autogenerated, so we chain
#     off it via workflow_run rather than editing it (a release created by GITHUB_TOKEN
#     would not fire an `on: release` trigger anyway). We gate to a successful, tag-push
#     Release run (release.yml also runs on pull_request, which must NOT deploy).
#
# Auth is GitHub OIDC -> a least-privilege IAM role (no long-lived AWS keys in the repo).
#
# Requires (repo Settings -> Secrets and variables -> Actions -> Secrets). All infra
# identifiers are Secrets (masked in the public build logs), not Variables:
#   - AWS_DEPLOY_ROLE_ARN   : arn of the OIDC deploy role (S3 + CloudFront invalidation)
#   - NABA_SITE_DOMAIN      : bare site host (e.g. naba.ysapp.net) -> S3 bucket + PUBLISH_URL
#   - NABA_CF_DISTRIBUTION  : CloudFront distribution id (make provision prints it)
#   - NABA_GA_MEASUREMENT_ID: GA4 id for the production build (optional; unset -> no gtag)
#
# PUBLISH_URL (Pelican's production SITEURL) is derived here from NABA_SITE_DOMAIN. The region
# (us-east-1) is a fixed CloudFront/ACM requirement, pinned in web/scripts/provision_aws.sh.
name: Deploy web

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

# OIDC needs id-token: write; checkout needs contents: read. Nothing else.
permissions:
  id-token: write
  contents: read

# Never run two site deploys against the same bucket at once.
concurrency:
  group: web-deploy
  cancel-in-progress: false

jobs:
  deploy-web:
    name: Build + deploy site
    runs-on: ubuntu-latest
    # Manual runs always deploy; auto runs only for a SUCCESSFUL, tag-push Release
    # (skip release.yml's pull_request runs and any failed release).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Pelican
        run: pip install -r web/requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build + deploy (S3 sync + CloudFront invalidation)
        env:
          # Bare host -> S3 bucket (Makefile) and, derived below, Pelican's production SITEURL.
          NABA_SITE_DOMAIN: ${{ secrets.NABA_SITE_DOMAIN }}
          PUBLISH_URL: https://${{ secrets.NABA_SITE_DOMAIN }}
          NABA_CF_DISTRIBUTION: ${{ secrets.NABA_CF_DISTRIBUTION }}
          # Production-only GA4 id; when unset the base template renders no gtag snippet.
          NABA_GA_MEASUREMENT_ID: ${{ secrets.NABA_GA_MEASUREMENT_ID }}
        run: |
          make -C web deploy
