# skills command group (SPEC-SKILLS, §3.11). --target isolates the destination.
#
# The install/upgrade/remove/status commands now emit the universal --json envelope
# (SPEC-JSON-006) when --json is set (incl. the SPEC-GLOBAL-003 piped auto-enable). The
# human-line goldens below therefore run under a PTY (a chardevice), where --json is NOT
# force-enabled, so the human output is exercised exactly as before. The piped JSON-envelope
# form is pinned by the `*-json` cases (and enumerated by test_json_envelope.py).
cases:
  - id: skills-status-not-installed
    spec: [SPEC-SKILLS-002, SPEC-SKILLS-006]
    argv: ["skills", "status", "--target", "{SKILLS_DEST}"]
    provider_mock: false
    skills_dest: true
    mode: pty
    golden: stdout

  - id: skills-install
    spec: [SPEC-SKILLS-001, SPEC-SKILLS-002, SPEC-SKILLS-003, SPEC-SKILLS-004]
    argv: ["skills", "install", "--target", "{SKILLS_DEST}"]
    provider_mock: false
    skills_dest: true
    mode: pty
    golden: stdout

  - id: skills-install-dry-run
    spec: [SPEC-SKILLS-001, SPEC-SKILLS-004]
    argv: ["skills", "install", "--target", "{SKILLS_DEST}", "--dry-run"]
    provider_mock: false
    skills_dest: true
    mode: pty
    golden: stdout

  - id: skills-status-installed
    # SPEC-EMBED-003: up-to-date/complete/unmodified against a fresh install.
    spec: [SPEC-SKILLS-006, SPEC-EMBED-001, SPEC-EMBED-003]
    pre_argv:
      - ["skills", "install", "--target", "{SKILLS_DEST}"]
    argv: ["skills", "status", "--target", "{SKILLS_DEST}"]
    provider_mock: false
    skills_dest: true
    mode: pty
    golden: stdout

  - id: skills-status-modified
    # SPEC-EMBED-002/003: the deployed tree-hash detects a post-install modification,
    # so `status` flips the unmodified flag to ✗ (up-to-date/complete stay ✓).
    spec: [SPEC-SKILLS-006, SPEC-EMBED-002, SPEC-EMBED-003]
    pre_argv:
      - ["skills", "install", "--target", "{SKILLS_DEST}"]
    tamper:
      - "naba/SKILL.md"
    argv: ["skills", "status", "--target", "{SKILLS_DEST}"]
    provider_mock: false
    skills_dest: true
    mode: pty
    golden: stdout

  - id: skills-upgrade
    spec: [SPEC-SKILLS-004]
    pre_argv:
      - ["skills", "install", "--target", "{SKILLS_DEST}"]
    argv: ["skills", "upgrade", "--target", "{SKILLS_DEST}"]
    provider_mock: false
    skills_dest: true
    mode: pty
    golden: stdout

  - id: skills-remove
    spec: [SPEC-SKILLS-005]
    pre_argv:
      - ["skills", "install", "--target", "{SKILLS_DEST}"]
    argv: ["skills", "remove", "--target", "{SKILLS_DEST}"]
    provider_mock: false
    skills_dest: true
    mode: pty
    golden: stdout

  - id: skills-remove-absent
    spec: [SPEC-SKILLS-005]
    argv: ["skills", "remove", "--target", "{SKILLS_DEST}"]
    provider_mock: false
    skills_dest: true
    mode: pty
    golden: stdout

  - id: skills-remove-dry-run
    spec: [SPEC-SKILLS-005]
    pre_argv:
      - ["skills", "install", "--target", "{SKILLS_DEST}"]
    argv: ["skills", "remove", "--target", "{SKILLS_DEST}", "--dry-run"]
    provider_mock: false
    skills_dest: true
    mode: pty
    golden: stdout

  # --- Universal --json envelope (SPEC-JSON-006), piped so --json auto-enables. ---
  - id: skills-install-json
    spec: [SPEC-SKILLS-001, SPEC-JSON-006]
    requires: [provider]
    argv: ["skills", "install", "--target", "{SKILLS_DEST}"]
    provider_mock: false
    skills_dest: true
    golden: stdout

  - id: skills-status-json
    spec: [SPEC-SKILLS-006, SPEC-JSON-006]
    requires: [provider]
    pre_argv:
      - ["skills", "install", "--target", "{SKILLS_DEST}"]
    argv: ["skills", "status", "--target", "{SKILLS_DEST}"]
    provider_mock: false
    skills_dest: true
    golden: stdout
