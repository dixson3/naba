# SPEC<->test traceability exemptions (plan-004, Issue 5.3).
#
# Consumed by check_traceability.py. Each key is a SPEC clause id that is NOT
# referenced by a cases/*.yaml `spec:` field NOR cited by a pytest module, but is
# nonetheless covered — by test_mcp.py's structural (non-id-citing) asserts, by
# cargo unit tests, or is a help-prose / [DIVERGENCE] clause pinned only at the
# semantics level. Every entry MUST carry a concrete reason; the checker rejects a
# blank reason and rejects any key that is not a real clause.
#
# This reflects the coverage the suite actually has as of Issues 1.3/1.4/4.5:
# 106 clauses covered by parity cases, the MCP surface by test_mcp.py, and the
# clauses below by cargo tests / semantics-level pins.
exemptions:
  # --- MCP tool clauses covered by test_mcp.py structural asserts (not by a
  #     literal SPEC-id in the source). tools/list is asserted per-tool
  #     (inventory, enums, defaults, bounds) + golden/mcp/tools.json snapshot. ---
  SPEC-MCP-007: "generate_icon tool schema asserted structurally by test_mcp.py (tools/list per-tool checks + golden/mcp/tools.json), no literal id cite."
  SPEC-MCP-008: "generate_pattern tool schema asserted structurally by test_mcp.py (tools/list + tools.json golden)."
  SPEC-MCP-009: "generate_story tool schema + steps 2..8 validation asserted by test_mcp.py (tools/list + validation-error-results test)."
  SPEC-MCP-010: "generate_diagram tool schema asserted structurally by test_mcp.py (tools/list + tools.json golden)."

  # --- Help-prose clauses: help layout/wording is [SPEC-DIVERGE-001] (cobra->clap
  #     rewording); the suite pins flag inventory / enum membership, not full help
  #     snapshots. These clauses are string-for-string help prose only. ---
  SPEC-INV-003: "Root Use/Short/Long help prose; Long is [DIVERGENCE] (multi-provider reword). Help snapshots are out of parity scope per SPEC-DIVERGE-001; command inventory is pinned by inventory.yaml/mcp.yaml (SPEC-INV-001)."
  SPEC-CONFIG-001: "config parent Short/Long help prose; the valid-keys list is [DIVERGENCE] (nested dotted keys: default-provider, <provider>.model/api-key/api-key-envvar, image defaults). Prose is not snapshotted (SPEC-DIVERGE-001); the key set is pinned via config.yaml / exit_codes.yaml cases (SPEC-CFGSCHEMA-001, SPEC-ERR-008/009)."
  SPEC-GLOBAL-002: "[NEW] --provider global flag. Its help string is [DIVERGENCE]; the flag's behavior is exercised throughout precedence.yaml / generate.yaml (`--provider gemini|openrouter`) and select.rs cargo tests. Only the help-inventory line is unpinned."

  # --- MCP-only output-dir precedence, exercised by test_mcp.py (images asserted
  #     written under NABA_OUTPUT_DIR; list_images output-dir resolution). ---
  SPEC-CFGSCHEMA-004: "Output-dir precedence (NABA_OUTPUT_DIR > config > XDG) is MCP-side; test_mcp.py sets NABA_OUTPUT_DIR and asserts images/list_images resolve under it. The CLI-vs-MCP asymmetry (SPEC-CFGSCHEMA-005) is pinned by generate.yaml."

  # --- Config-migration clauses: Rust-only machinery (no Go counterpart), covered
  #     by cargo unit tests in src/config.rs. The flat->nested rewrite is on-disk
  #     state, not a black-box stdout/stderr surface, so it is unit-tested not
  #     golden-pinned (the resolved effect flows through the precedence.yaml cases). ---
  SPEC-MIGRATE-001: "[NEW] flat->nested structural migration + per-key mapping. cargo tests config::tests::flat_config_migrates_backs_up_and_is_idempotent, migrate_openrouter_default_with_stray_gemini_api_key, migrate_flat_model_without_provider_targets_gemini, image_defaults_only_config_not_migrated, load_migrates_flat_and_resolves_nested."
  SPEC-MIGRATE-002: "[NEW] .bak-backed idempotent structural rewrite, graceful on edge inputs. cargo tests config::tests::flat_config_migrates_backs_up_and_is_idempotent (.bak = original bytes, idempotent) + migration_is_graceful_on_edge_inputs (missing/empty/malformed/already-nested)."
  SPEC-MIGRATE-003: "[NEW/ACCEPTED] structural rewrite loses YAML comments. cargo test config::tests::flat_config_migrates_backs_up_and_is_idempotent asserts comment loss + the .bak mitigation."
  SPEC-MIGRATE-004: "[NEW] serde_norway required, serde_yml forbidden (RUSTSEC-2025-0068). Enforced at the Cargo.toml dependency level (compile-time), not a runtime behavior."

  # --- Provider-layer [NEW] clauses covered by cargo unit tests (src/provider). ---
  SPEC-PROVIDER-001: "[NEW] umbrella: the registered provider set (gemini/openrouter/bedrock), every image path routes through the selected one. Covered transitively by every provider-tagged parity case + gemini.rs/openrouter.rs/bedrock.rs/select.rs cargo tests; no standalone observable behavior of its own."
  SPEC-PROVIDER-012: "[NEW] AWS Bedrock provider (thin reqwest InvokeModel, Amazon+Stability families, region default, curated list_models). No Go baseline and no parity mock (bearer/SigV4 auth, per-family bodies), so covered by cargo tests in src/provider/bedrock.rs (family_for, amazon_body/stability_body shapes, amazon_dimensions, parse_images + artifacts fallback, parse_api_error, list_models curated set, and the wiremock http:: integration tests) + registry.rs registration tests. Also exercised via `naba provider` (provider.yaml lists bedrock)."
  SPEC-PROVIDER-013: "[NEW] Bedrock two auth modes + pure mode selection. cargo tests src/provider/bedrock.rs::select_auth_mode_prefers_bearer_when_token_present, provider_auth_headers_bearer_when_key_present, parse_credentials_ini_named_and_default; the SigV4 signing path is unit-wired but only fully validated against real AWS (documented in SPEC-PROVIDER-012/013)."
  SPEC-PROVIDER-006: "[NEW] openrouter/auto rejected for image paths (exit 2, pre-HTTP). cargo tests in src/provider/openrouter.rs (auto-guard) + select.rs; the early guard means no request is ever made, so it is not a mock-observable parity case."
  SPEC-PROVIDER-008: "[NEW/INTENTIONAL] multi-key -> OpenRouter reroute precedence. cargo tests select.rs::autodetect_both_keys_no_config_is_openrouter_default_slug + config-gemini-beats-openrouter-env mitigation. Documented in README/SPEC-DIVERGE-005."

  # --- [NEW] OpenRouter moderation error mapping: mock-validated, not a stable
  #     parity golden (live-key smoke resolved it to exit 5). ---
  SPEC-ERR-017: "[NEW] OpenRouter moderation/content-policy 403 -> exit 3-or-5. cargo tests in src/provider/openrouter.rs (moderation-403 mapping); the Go baseline has no OpenRouter path so it cannot be a both-target parity case."

  # --- [DIVERGENCE] clauses: sanctioned intentional differences. The suite pins
  #     the semantics/inventory, not a byte-identical snapshot, so these carry no
  #     dedicated `spec:` case; the semantics are exercised where noted. ---
  SPEC-DOCTOR-006: "[DIVERGENCE] provider-aware api_key/api_live/model_reachable checks. doctor.yaml pins doctor envelope shape + status semantics (SPEC-DOCTOR-003/005); the exact provider-named detail strings are intentionally unpinned."
  SPEC-EMBED-004: "[DIVERGENCE] Rust embed hash may differ from Go's (one-time post-cutover `naba skills upgrade`). skills.yaml pins the up-to-date/complete/unmodified flag semantics against a freshly-installed tree, not the hash literal."
  SPEC-VERSION-BUILD-001: "[DIVERGENCE] build.rs version injection replaces Go ldflags. version.yaml + the normalizer (SPEC-JSON-005) pin the output format with Version/Commit/Date normalized; the concrete build values are intentionally unpinned."

  # --- [NEW — plan-005] Rust-only self-update / distribution / XDG / preflight
  #     clauses (SPEC-DIVERGE-007). No Go counterpart, so they are EXEMPT from the
  #     Go-captured parity goldens; each is covered by cargo unit tests (and the
  #     cargo-dist config by `dist plan`/`cargo build` at execution). Live
  #     end-to-end `self update` is a deferred post-first-release follow-on. ---
  SPEC-DIST-001: "[NEW/Rust-only] Cargo.toml [workspace]+[profile.dist] inert for build/test — validated by `cargo build`/`cargo test` (they pass with the tables added). Config surface, no runtime behavior."
  SPEC-DIST-002: "[NEW/Rust-only] [workspace.metadata.dist] config validated by `dist plan` at execution (4 targets .tar.gz+sha256, shell+homebrew installers, no depends_on). Config, not a mock-observable CLI behavior."
  SPEC-DIST-003: "[NEW/Rust-only] generated .github/workflows/release.yml (tag glob, homebrew publish job, asset names) validated by `dist generate --mode ci` at execution; the live release is a deferred follow-on. Not a black-box CLI behavior."
  SPEC-DIRS-001: "[NEW/Rust-only] XDG dir + receipt-path precedence. cargo tests src/dirs.rs (cache/data/bin/receipt/update-check precedence) + src/config.rs::config_dir_precedence_naba_then_xdg_then_default."
  SPEC-SELF-001: "[NEW/Rust-only] from-build install/uninstall + receipt/marker. cargo tests src/self_cmd/install.rs::install_copies_binary_and_writes_marker, uninstall.rs::uninstall_removes_marker_and_optionally_binary, receipt.rs (real-shape receipt fixture + marker round-trip)."
  SPEC-SELF-002: "[NEW/Rust-only] path-primary source classification precedence. cargo tests src/self_cmd/source.rs (homebrew_wins_over_everything, from_build_wins_over_vendor, vendor/unknown branches, auto_updatable/nag_eligible)."
  SPEC-SELF-003: "[NEW/Rust-only] source gate + Homebrew-refuse. cargo tests src/self_cmd/update.rs::homebrew_is_refused_even_with_force, from_build_refused_without_force, refused_json_envelope_shape."
  SPEC-SELF-004: "[NEW/Rust-only] dist-manifest fetch/select/verify/extract/swap behind Fetcher+swap seams. cargo tests src/self_cmd/update.rs (full_update_verifies_and_swaps, checksum_mismatch_bails_before_swap, check_reports_available_without_swapping, version_compare) + archive.rs (extract/sha256/parse_sha256). Live e2e deferred to post-first-release."
  SPEC-SELF-005: "[NEW/Rust-only] post-update skills refresh. Now receipt-driven (plan-008 Issue 2.5): a single unqualified `skills upgrade` enumerates every recorded install target (migrating an empty receipt from a legacy .claude/.agents disk scan first). Covered by cargo tests src/skills_install.rs (synthesize_from_legacy_maps_surfaces_and_is_idempotent, save/load round-trip); the subprocess exec is live-verified by the follow-on release bead."
  SPEC-SELF-006: "[NEW/Rust-only] update-check cache + throttled nag. cargo tests src/self_cmd/update_check.rs (round-trip, staleness, corrupt-as-absent) + nag.rs (should_nag throttle/availability)."
  SPEC-PREFLIGHT-001: "[NEW/Rust-only] preflight envelope + shared resolution. cargo tests src/preflight.rs (axis + overall_status tests); live envelope shape exercised at execution."
  SPEC-PREFLIGHT-002: "[NEW/Rust-only] offline auth axis (provider key-present). cargo test src/preflight.rs::auth_axis_key_present_vs_missing (reuses doctor::resolve_provider/provider_api_key)."
  SPEC-PREFLIGHT-003: "[NEW/Rust-only] skills-up-to-date axis. cargo tests src/preflight.rs::skills_axis_all_good_is_ok / skills_axis_reports_first_failure (over embed::skill_status)."
  SPEC-PREFLIGHT-004: "[NEW/Rust-only] binary tri-state axis (unknown non-blocking) + overall status/exit codes. cargo tests src/preflight.rs::binary_axis_absent_cache_is_unknown / stale / fresh + overall_ok_when_auth_and_skills_pass_regardless_of_binary + overall_blocks_on_auth_then_skills."

  # --- [NEW — plan-008] Harness-layout SPEC (SPEC-HARNESS, skills.md §19). Rust-only
  #     per-harness skills-install descriptor + receipt-driven multi-harness upgrade.
  #     No Go counterpart, so exempt from the Go-captured parity goldens; each is
  #     covered by cargo unit tests in src/harness.rs / src/skills.rs / src/skills_install.rs.
  #     SPEC-HARNESS-002 (the pinned descriptor table) is asserted byte-equal against
  #     the shipped Rust descriptor by the cargo test below. ---
  SPEC-HARNESS-001: "[NEW/Rust-only] descriptor model + resolve_dest(scope, harness, target). cargo tests src/harness.rs::resolve_subpath_split_user_vs_project (anchor+subpath join) and src/skills.rs::resolve_dest_target_wins / resolve_dest_harness_paths (--target override + per-harness dest)."
  SPEC-HARNESS-002: "[PINNED/Rust-only] the five-row descriptor table asserted BYTE-EQUAL against the shipped src/harness.rs descriptor by cargo test harness::tests::shipped_descriptor_matches_spec_harness_table (parses skills.md §19 SPEC-HARNESS-002 table and compares each row); also harness::tests::table_has_five_canonical_rows."
  SPEC-HARNESS-003: "[NEW/Rust-only] discovery/scope rules (user→\\$HOME, project→git-root-else-cwd, --target override). cargo tests src/harness.rs::resolve_subpath_split_user_vs_project + src/skills.rs::resolve_dest_target_wins."
  SPEC-HARNESS-004: "[NEW/Rust-only] --surface→--harness migration/alias + default claude-code + legacy uniform fallback. cargo tests src/harness.rs::surface_alias_maps_known_and_passes_through, resolve_single_prefers_harness_then_surface_then_default, resolve_list_defaults_maps_and_appends_surface, unknown_harness_falls_back_to_legacy_uniform_layout."
  SPEC-HARNESS-005: "[NEW/Rust-only] codex↔agents .agents/skills overlap + dedupe-by-resolved-path (first-requested wins, recorded once). cargo tests src/harness.rs::codex_and_agents_overlap_on_dot_agents + src/skills.rs::install_targets_dedupe_shared_path."
  SPEC-HARNESS-006: "[NEW/Rust-only] extensibility: a new harness is a single data row. cargo tests src/harness.rs::table_has_five_canonical_rows + lookup_finds_and_misses assert the data-row model; adding a row is a data-only change with no structural code path to golden-pin."
  SPEC-HARNESS-007: "[NEW/Rust-only] uniform install unit + required frontmatter identical across harnesses; name_transform constrains the on-disk name only. cargo tests src/harness.rs::shipped_descriptor_matches_spec_harness_table (frontmatter_required + name_transform columns) + resolve_subpath_split_user_vs_project (only subpath differs)."

  # --- [NEW — plan-008] Dual-purpose two-tree render + install receipt + multi-target
  #     JSON. All Rust-only (no Go baseline), covered by build.rs + cargo unit tests in
  #     src/skills_install.rs / src/skills.rs; the hash-preservation + single-target JSON
  #     goldens are pinned by tests/parity/cases/skills.yaml. ---
  SPEC-EMBED-005: "[NEW/plan-008; amended plan-011] minijinja SKILL.md template + build.rs two-tree render. Authored (not subtractive): cli/ = source minus the mcp-only skills/<skill>/mcp/… subtree (byte-identical → SPEC-EMBED-002 hash preserved); mcp/ = SKILL.md {% if mcp %} guide body + the mcp-only subtree, with commands/*.md and README.md excluded. Rendered at build time by `cargo build` (build.rs render_skill_trees); the byte-identical/hash-preservation invariant is pinned by skills.yaml (SPEC-EMBED-002/003 up-to-date/unmodified against a freshly-installed tree), and the mcp/ served tree by test_mcp.py (SPEC-MCP-014/015). No Go counterpart."
  SPEC-INSTALL-001: "[NEW/Rust-only] skills-install.json target registry keyed by (harness, scope, path) + idempotent upsert/remove + version normalization. cargo tests src/skills_install.rs::upsert_is_idempotent_on_key, save_then_load_round_trips_and_normalizes_version, missing_file_loads_empty, remove_by_key + src/skills.rs::record_target. On-disk state, not a black-box stdout surface."
  SPEC-INSTALL-002: "[NEW/Rust-only] unqualified `skills upgrade` enumerates recorded targets, continue-on-error, dedupe by resolved path; post-update refresh + preflight receipt-driven. cargo tests src/skills.rs::install_targets_dedupe_shared_path + targets_for over the receipt; tied to SPEC-SELF-005 (receipt-driven refresh). No Go baseline."
  SPEC-INSTALL-003: "[NEW/Rust-only] legacy .claude/.agents disk-scan receipt synthesis, idempotent. cargo tests src/skills_install.rs::synthesize_from_legacy_maps_surfaces_and_is_idempotent + load_or_migrate. Rust-only, no Go counterpart."
  SPEC-JSON-007: "[NEW/Rust-only] skills install/upgrade --json single-target flat shape vs multi-harness targets[] array (first-requested order, resolved-path dedupe). The single-target flat envelope is pinned by tests/parity/cases/skills.yaml (SPEC-JSON-006); the multi-target targets[] aggregation is Rust-only (no Go baseline, needs multiple real harness dirs) and covered by cargo tests in src/skills.rs (targets_for / run over multiple targets)."
